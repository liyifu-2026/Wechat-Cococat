# Sample docker-compose for standalone agent-wechat deployment.
# Generate a token before starting:
#   mkdir -p ~/.config/agent-wechat
#   openssl rand -hex 32 > ~/.config/agent-wechat/token
#   chmod 600 ~/.config/agent-wechat/token

services:
  agent-wechat:
    image: agent-wechat-fork:latest
    container_name: agent-wechat
    security_opt:
      - seccomp=unconfined
    cap_add:
      - SYS_PTRACE
      - NET_ADMIN
    ports:
      - "6174:6174"
    volumes:
      - agent-wechat-data:/data
      - agent-wechat-home:/home/wechat
      - ~/.config/agent-wechat/token:/data/auth-token:ro
    environment:
      - TZ=Asia/Shanghai
      - PROXY=${PROXY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-xiaomi-token-plan-cn}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-mimo-v2.5}
      - WIKI_ENABLED=${WIKI_ENABLED:-false}
      - WIKI_API_URL=${WIKI_API_URL:-http://127.0.0.1:19828}
      - WIKI_API_TOKEN=${WIKI_API_TOKEN:-}
      - SYSTEM_PROMPT=${SYSTEM_PROMPT:-}
    restart: unless-stopped

volumes:
  agent-wechat-data:
  agent-wechat-home:
