# TencentDB Agent Memory sidecar
#
# 构建镜像（在 TencentDB-Agent-Memory 仓库 docker/opensource 目录）:
#   docker build -f Dockerfile.hermes -t hermes-memory .
#
# 启动:
#   docker compose -f docker-compose.tencentdb-memory.yml up -d
#
# 验证:
#   curl http://127.0.0.1:8420/health
#
# CocoCat Agent 环境变量:
#   TDAI_GATEWAY_URL=http://127.0.0.1:8420
#   TDAI_MEMORY_ENABLED=true   # 设为 false 可禁用
#
# 数据卷: ~/.local/share/cococat/memory/

services:
  tencentdb-memory:
    image: ${TENCENTDB_IMAGE:-hermes-memory:latest}
    container_name: tencentdb-memory
    ports:
      - "8420:8420"
    volumes:
      - ${COCOCAT_DATA_DIR:-~/.local/share/cococat}/memory:/opt/data
    env_file:
      - ${TENCENTDB_ENV_FILE:-~/.config/cococat/memory.env}
    environment:
      - MODEL_API_KEY=${TDAI_LLM_API_KEY:-}
      - MODEL_BASE_URL=${TDAI_LLM_BASE_URL:-https://api.deepseek.com/v1}
      - MODEL_NAME=${TDAI_LLM_MODEL:-deepseek-chat}
      - MODEL_PROVIDER=custom
    restart: unless-stopped
