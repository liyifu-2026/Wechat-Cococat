name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.publish.outputs.published }}
      publishedPackages: ${{ steps.publish.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # npm >= 11.5 required for OIDC trusted publishing. Use Corepack to
      # activate it, because the bundled npm 10.9.7 in the Node 22.22.2 runner
      # image is broken at the arborist rebuild step (MODULE_NOT_FOUND:
      # 'promise-retry') and cannot install anything — including itself.
      - name: Activate npm 11.12.1 via Corepack
        run: |
          corepack enable npm
          corepack prepare npm@11.12.1 --activate
          echo "Active npm: $(npm --version)"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Create Release PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          title: "Version Packages"
          commit: "Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish separately so npm can use OIDC (no NODE_AUTH_TOKEN needed)
      - name: Publish to npm
        id: publish
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          OUTPUT=$(pnpm changeset publish 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "New tag:"; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            PACKAGES=$(echo "$OUTPUT" | grep "New tag:" | sed 's/.*New tag: *//' | jq -Rc 'split("@") | {name: (.[:-1] | join("@")), version: .[-1]}' | jq -sc '.')
            echo "publishedPackages=$PACKAGES" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "publishedPackages=[]" >> "$GITHUB_OUTPUT"
          fi
        env:
          NPM_CONFIG_PROVENANCE: true

  publish-binary:
    name: Binary (${{ matrix.arch }})
    needs: release
    if: needs.release.outputs.published == 'true'
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          PUBLISHED='${{ needs.release.outputs.publishedPackages }}'
          VERSION=$(echo "$PUBLISHED" | jq -r '.[0].version // "latest"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build binary in Docker
        run: |
          RUST_DIR="packages/driver"
          BUILDER_IMAGE="rust:1.93-bookworm"

          docker run --rm \
            --platform ${{ matrix.platform }} \
            -v "$PWD/$RUST_DIR:/build" \
            -v "agent-wechat-cargo-cache-${{ matrix.arch }}:/build/target" \
            -v "agent-wechat-cargo-registry-${{ matrix.arch }}:/usr/local/cargo/registry" \
            -w /build \
            "$BUILDER_IMAGE" \
            cargo build --release

          # Extract binary from cache volume
          TMP_CT=$(docker create \
            -v "agent-wechat-cargo-cache-${{ matrix.arch }}:/target:ro" \
            "$BUILDER_IMAGE")
          docker cp "$TMP_CT:/target/release/agent-server" ./agent-server
          docker rm "$TMP_CT" > /dev/null

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ASSET="agent-server-${VERSION}-linux-${{ matrix.arch }}"
          mv agent-server "$ASSET"
          chmod +x "$ASSET"
          gh release create "v${VERSION}" --title "v${VERSION}" --notes "Release v${VERSION}" 2>/dev/null || true
          gh release upload "v${VERSION}" "$ASSET" --clobber

  publish-tools:
    name: Docker Tools
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          PUBLISHED='${{ needs.release.outputs.publishedPackages }}'
          VERSION=$(echo "$PUBLISHED" | jq -r '.[0].version // "latest"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package tools
        run: |
          tar -czf "docker-tools-${{ steps.version.outputs.version }}.tar.gz" -C docker tools

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v${VERSION}" --title "v${VERSION}" --notes "Release v${VERSION}" 2>/dev/null || true
          gh release upload "v${VERSION}" "docker-tools-${VERSION}.tar.gz" --clobber

  publish-docker:
    name: Docker (${{ matrix.arch }})
    needs: release
    if: needs.release.outputs.published == 'true'
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Docker context
        run: |
          rm -rf docker/agent-server-rust
          mkdir -p docker/agent-server-rust
          cp packages/driver/Cargo.toml docker/agent-server-rust/
          [ -f packages/driver/Cargo.lock ] && cp packages/driver/Cargo.lock docker/agent-server-rust/
          cp -r packages/driver/src docker/agent-server-rust/
          cp -r packages/driver/migrations docker/agent-server-rust/

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          PUBLISHED='${{ needs.release.outputs.publishedPackages }}'
          VERSION=$(echo "$PUBLISHED" | jq -r '.[0].version // "latest"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: docker
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          DIGEST="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${DIGEST#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-docker-manifest:
    name: Docker Manifest
    needs: [release, publish-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          PUBLISHED='${{ needs.release.outputs.publishedPackages }}'
          VERSION=$(echo "$PUBLISHED" | jq -r '.[0].version // "latest"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create multi-arch manifest
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          docker buildx imagetools create \
            -t "${IMAGE}:${{ steps.version.outputs.version }}" \
            -t "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " $(ls /tmp/digests/))

  publish-wechaty-gateway:
    name: Wechaty Gateway (${{ matrix.arch }})
    needs: release
    if: needs.release.outputs.published == 'true'
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/wechaty-gateway/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository }}-wechaty-gateway,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=wechaty-gateway-${{ matrix.arch }}
          cache-to: type=gha,scope=wechaty-gateway-${{ matrix.arch }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          DIGEST="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${DIGEST#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: wechaty-gateway-digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-wechaty-gateway-manifest:
    name: Wechaty Gateway Manifest
    needs: [release, publish-wechaty-gateway]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: wechaty-gateway-digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          PUBLISHED='${{ needs.release.outputs.publishedPackages }}'
          VERSION=$(echo "$PUBLISHED" | jq -r '.[0].version // "latest"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create multi-arch manifest
        run: |
          IMAGE="ghcr.io/${{ github.repository }}-wechaty-gateway"
          docker buildx imagetools create \
            -t "${IMAGE}:${{ steps.version.outputs.version }}" \
            -t "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " $(ls /tmp/digests/))
