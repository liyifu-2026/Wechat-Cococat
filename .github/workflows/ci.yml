name: CI

on:
  pull_request:
    paths:
      - 'packages/**'
      - 'apps/**'
      - 'docs/**'
      - 'scripts/**'
      - 'README.md'
      - 'docker/**'
      - 'docker-compose.yml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.json'
      - '.github/workflows/ci.yml'

jobs:
  repository-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Reject tracked dependencies and generated files
        run: bash scripts/check-repo-clean.sh

  changes:
    runs-on: ubuntu-latest
    outputs:
      ts: ${{ steps.filter.outputs.ts }}
      rust_driver: ${{ steps.filter.outputs.rust_driver }}
      rust_console: ${{ steps.filter.outputs.rust_console }}
      integration: ${{ steps.filter.outputs.integration }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            ts:
              - 'packages/cli/**'
              - 'packages/shared/**'
              - 'packages/agent/**'
              - 'packages/openclaw-extension/**'
              - 'packages/wechaty-gateway/**'
              - 'packages/wechaty-puppet/**'
              - 'apps/console/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'tsconfig.json'
              - '.github/workflows/ci.yml'
            rust_driver:
              - 'packages/driver/**'
              - 'docker/**'
              - 'docker-compose.yml'
              - '.github/workflows/ci.yml'
            rust_console:
              - 'apps/console/src-tauri/**'
              - '.github/workflows/ci.yml'
            integration:
              - 'scripts/**'
              - 'packages/driver/**'
              - 'packages/agent/**'
              - '.github/workflows/ci.yml'
            docs:
              - 'docs/**'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'

  ts:
    needs: changes
    if: needs.changes.outputs.ts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (all packages)
        run: pnpm -r --if-present test

  rust-driver:
    needs: changes
    if: needs.changes.outputs.rust_driver == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/driver

      - name: Cargo check
        run: cargo check --manifest-path packages/driver/Cargo.toml

      - name: Cargo test
        run: cargo test --manifest-path packages/driver/Cargo.toml

  docker-build:
    needs: changes
    if: needs.changes.outputs.rust_driver == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker context
        run: bash scripts/prepare-docker-context.sh

      - uses: docker/setup-buildx-action@v4

      - name: Build driver image (builder stage)
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile
          target: builder
          platforms: linux/amd64
          push: false
          cache-from: type=gha,scope=driver-builder
          cache-to: type=gha,scope=driver-builder,mode=max

  integration:
    needs: changes
    if: needs.changes.outputs.integration == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/driver

      - name: Stack + driver smoke
        run: bash scripts/ci-stack-smoke.sh

  rust-console:
    needs: changes
    if: needs.changes.outputs.rust_console == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libssl-dev libsoup-3.0-dev protobuf-compiler

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/console/src-tauri

      - name: Cargo check
        working-directory: apps/console/src-tauri
        run: cargo check

      - name: Cargo test
        working-directory: apps/console/src-tauri
        run: cargo test

  docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @cococat/docs

      - name: Build docs
        run: pnpm --filter @cococat/docs build
