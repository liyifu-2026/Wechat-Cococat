name: Docker Rebuild

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag (e.g. 0.2.2). Also tags :latest."
        required: true
      no-cache:
        description: "Skip Docker layer cache (re-downloads WeChat)"
        type: boolean
        default: true

concurrency: docker-rebuild

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Docker context
        run: bash scripts/prepare-docker-context.sh

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: docker
          platforms: ${{ matrix.platform }}
          no-cache: ${{ inputs.no-cache }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          DIGEST="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${DIGEST#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          docker buildx imagetools create \
            -t "${IMAGE}:${{ inputs.version }}" \
            -t "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " $(ls /tmp/digests/))
