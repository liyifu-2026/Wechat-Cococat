[build]
# Default target for cross-compilation
# Uncomment when building for the Docker container:
# target = "x86_64-unknown-linux-gnu"

[target.x86_64-unknown-linux-gnu]
# Used by `cross` for Linux builds from macOS
# cross handles this automatically via Docker

[target.aarch64-unknown-linux-gnu]
# ARM64 Linux target (for ARM containers)
# cross handles this automatically via Docker
